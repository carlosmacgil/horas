<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿A qué hora salgo?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --card: #111118; --accent: #e8ff47;
    --accent2: #ff4757; --text: #f0f0f0; --muted: #555566; --border: #222230;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 20% 50%, rgba(232,255,71,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 50%, rgba(255,71,87,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
  .container { width: 100%; max-width: 520px; padding: 20px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
  .header-label { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 12vw, 72px); letter-spacing: 2px; line-height: 1; }
  .header h1 span { color: var(--accent); }
  .current-time-bar {
    background: var(--border); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; animation: fadeDown 0.6s 0.1s ease both;
  }
  .current-time-label { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
  .current-time-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 2px; }
  .input-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 30px; margin-bottom: 24px; animation: fadeDown 0.6s 0.2s ease both;
  }
  .input-label { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; display: block; }
  .time-input {
    width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 6px;
    padding: 16px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 64px;
    color: var(--text); letter-spacing: 6px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; text-align: center;
  }
  .time-input::placeholder { color: var(--muted); }
  .time-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,0.08); }
  .time-input.error { border-color: var(--accent2); animation: shake 0.3s ease; }
  .input-preview { text-align: center; font-size: 13px; color: var(--accent); letter-spacing: 2px; margin-top: 12px; min-height: 20px; opacity: 0; transition: opacity 0.2s; }
  .input-preview.visible { opacity: 1; }
  .hint { margin-top: 8px; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-align: center; }
  .result {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 30px; animation: fadeDown 0.6s 0.3s ease both; min-height: 180px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .result.has-result { border-color: rgba(232,255,71,0.2); }
  .result.overtime { border-color: rgba(255,71,87,0.3); }
  .empty-state { text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
  .stats { display: none; }
  .stats.visible { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .stat-card { background: var(--bg); border-radius: 6px; padding: 18px; border: 1px solid var(--border); }
  .stat-card.highlight { border-color: rgba(232,255,71,0.25); background: rgba(232,255,71,0.03); grid-column: span 2; }
  .stat-card.overtime-card { border-color: rgba(255,71,87,0.3); background: rgba(255,71,87,0.04); grid-column: span 2; }
  .stat-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; line-height: 1; color: var(--text); }

  /* Hora de salida con EB Garamond */
  .stat-card.highlight .stat-value,
  .stat-card.overtime-card .stat-value {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 68px;
    font-weight: 500;
    letter-spacing: -1px;
    line-height: 1;
  }
  .stat-card.highlight .stat-value { color: var(--accent); }
  .stat-card.overtime-card .stat-value { color: var(--accent2); font-style: italic; }

  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
  .progress-section { margin-top: 20px; display: none; animation: fadeDown 0.5s 0.4s ease both; }
  .progress-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .progress-bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); width: 0%; }
  .progress-bar-fill.overtime { background: var(--accent2); }
  .motivational { margin-top: 20px; padding: 14px 18px; background: var(--bg); border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; font-size: 12px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; display: none; }
  .motivational.overtime-msg { border-left-color: var(--accent2); }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-right:8px; animation:pulse 2s infinite; vertical-align:middle; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">calculadora de jornada</div>
    <h1>¿A qué hora<br><span>salgo?</span></h1>
  </div>
  <div class="current-time-bar">
    <span class="current-time-label"><span class="dot"></span>ahora mismo</span>
    <span class="current-time-value" id="clockDisplay">--:--</span>
  </div>
  <div class="input-section">
    <label class="input-label">¿cuánto llevas trabajado?</label>
    <input type="text" class="time-input" id="horasLlevadas" placeholder="HORAS" maxlength="4" inputmode="numeric" autocomplete="off"/>
    <div class="input-preview" id="inputPreview"></div>
    <div class="hint">524 → 5h 24min &nbsp;·&nbsp; 3 → 3h &nbsp;·&nbsp; 45 → 45min</div>
  </div>
  <div class="result" id="resultBox">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⏱</div>
      <div>mete cuánto llevas trabajado</div>
    </div>
    <div class="stats" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">llevas</div>
        <div class="stat-value" id="valLlevas">--</div>
        <div class="stat-sub" id="subLlevas"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">te quedan</div>
        <div class="stat-value" id="valQuedan">--</div>
        <div class="stat-sub" id="subQuedan"></div>
      </div>
      <div class="stat-card highlight" id="salidaCard">
        <div class="stat-label">hora de salida</div>
        <div class="stat-value" id="valSalida">--:--</div>
        <div class="stat-sub" id="subSalida"></div>
      </div>
    </div>
  </div>
  <div class="progress-section" id="progressSection">
    <div class="progress-header">
      <span>progreso de jornada</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>
  <div class="motivational" id="motivational"></div>
</div>
<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  updateClock();
  setInterval(() => { updateClock(); recalc(); }, 15000);

  function parseInput(raw) {
    raw = raw.replace(/[^0-9]/g, '');
    if (!raw) return null;
    let h, m;
    if (raw.length === 1) { h = parseInt(raw); m = 0; }
    else if (raw.length === 2) {
      const n = parseInt(raw);
      if (n <= 59) { h = 0; m = n; } else { h = parseInt(raw[0]); m = parseInt(raw[1]); }
    }
    else if (raw.length === 3) { h = parseInt(raw[0]); m = parseInt(raw.slice(1)); }
    else { h = parseInt(raw.slice(0,2)); m = parseInt(raw.slice(2,4)); }
    if (isNaN(h) || isNaN(m) || m > 59 || h > 23) return null;
    return { h, m, totalMin: h * 60 + m };
  }

  function formatDur(mins) {
    const a = Math.abs(mins), h = Math.floor(a/60), m = a%60;
    if (h===0) return m+'m';
    if (m===0) return h+'h';
    return h+'h '+m+'m';
  }

  function formatHora(totalMin) {
    const t = ((totalMin % 1440) + 1440) % 1440;
    return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
  }

  const inputEl = document.getElementById('horasLlevadas');
  const preview = document.getElementById('inputPreview');

  inputEl.addEventListener('input', e => {
    let digits = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
    let display = digits;
    if (digits.length >= 3) {
      display = digits.slice(0, digits.length - 2) + ':' + digits.slice(-2);
    }
    e.target.value = display;
    const p = parseInput(digits);
    if (p && digits.length > 0) {
      let label = '';
      if (p.h > 0) label += p.h + 'h ';
      if (p.m > 0) label += p.m + 'min';
      if (!label) label = '0min';
      preview.textContent = '→ ' + label.trim();
      preview.classList.add('visible');
      recalc();
    } else {
      preview.classList.remove('visible');
      if (!digits) resetResult();
    }
  });

  inputEl.addEventListener('keydown', e => { if (e.key==='Enter') recalc(); });

  function resetResult() {
    document.getElementById('emptyState').style.display = '';
    document.getElementById('statsGrid').classList.remove('visible');
    document.getElementById('resultBox').className = 'result';
    document.getElementById('progressSection').style.display = 'none';
    document.getElementById('motivational').style.display = 'none';
  }

  function recalc() {
    const v = inputEl.value.replace(/[^0-9]/g, '');
    if (!v) return;
    const p = parseInput(v);
    if (!p) { inputEl.classList.add('error'); setTimeout(()=>inputEl.classList.remove('error'),500); return; }
    render(p);
  }

  function render(p) {
    const jornadaMin = 480;
    const llevadosMin = p.totalMin;
    const quedanMin = jornadaMin - llevadosMin;
    const isOvertime = llevadosMin >= jornadaMin;
    const now = new Date();
    const ahoraMin = now.getHours()*60 + now.getMinutes();
    const salidaMin = ahoraMin + quedanMin;
    const pct = Math.min((llevadosMin / jornadaMin) * 100, 100);

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('statsGrid').classList.add('visible');
    document.getElementById('resultBox').className = 'result ' + (isOvertime ? 'overtime' : 'has-result');

    document.getElementById('valLlevas').textContent = formatDur(llevadosMin);
    document.getElementById('subLlevas').textContent = 'de 8h de jornada';

    const quedanCard = document.getElementById('valQuedan').closest('.stat-card');
    if (isOvertime) {
      document.getElementById('valQuedan').textContent = formatDur(Math.abs(quedanMin));
      document.getElementById('subQuedan').textContent = 'de más llevas';
      quedanCard.style.borderColor = 'rgba(255,71,87,0.3)';
    } else {
      document.getElementById('valQuedan').textContent = formatDur(quedanMin);
      document.getElementById('subQuedan').textContent = 'para acabar';
      quedanCard.style.borderColor = '';
    }

    const salidaCard = document.getElementById('salidaCard');
    document.getElementById('valSalida').textContent = formatHora(salidaMin);
    if (isOvertime) {
      document.getElementById('subSalida').textContent = 'ya deberías estar fuera — llevas ' + formatDur(Math.abs(quedanMin)) + ' de extra';
      salidaCard.className = 'stat-card overtime-card';
    } else {
      document.getElementById('subSalida').textContent = 'en ' + formatDur(quedanMin) + ' eres libre';
      salidaCard.className = 'stat-card highlight';
    }

    document.getElementById('progressSection').style.display = 'block';
    const fill = document.getElementById('progressFill');
    setTimeout(() => fill.style.width = pct + '%', 50);
    fill.classList.toggle('overtime', isOvertime);
    document.getElementById('progressPct').textContent = Math.round(pct) + '%';

    const msg = document.getElementById('motivational');
    msg.style.display = 'block';
    if (isOvertime) {
      msg.textContent = '🔥 llevas ' + formatDur(Math.abs(quedanMin)) + ' de extra. cierra el portátil ya.';
      msg.classList.add('overtime-msg');
    } else if (pct < 25) {
      msg.textContent = '☕ empezando. queda mucho, no mires el reloj.';
      msg.classList.remove('overtime-msg');
    } else if (pct < 50) {
      msg.textContent = '💪 menos de la mitad. sigue.';
      msg.classList.remove('overtime-msg');
    } else if (pct < 75) {
      msg.textContent = '🏃 más de la mitad. ya huele a libertad.';
      msg.classList.remove('overtime-msg');
    } else if (pct < 95) {
      msg.textContent = '⚡ recta final. aguanta un poco más.';
      msg.classList.remove('overtime-msg');
    } else {
      msg.textContent = '🎯 casi. minutos contados.';
      msg.classList.remove('overtime-msg');
    }
  }
</script>
</body>
</html>
